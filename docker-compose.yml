services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cyberdestiny-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cyberdestiny
      POSTGRES_PASSWORD: cyberdestiny_dev
      POSTGRES_DB: cyberdestiny
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cyberdestiny -d cyberdestiny']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
